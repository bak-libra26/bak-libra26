<svg xmlns="http://www.w3.org/2000/svg" width="850" height="195" viewBox="0 0 850 195" fill="none">
  <style>
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  </style>

  <rect x="0.5" y="0.5" width="849" height="194" rx="4.5" fill="#0d1117" stroke="#30363d" />
  
  <!-- Title bar -->
  <rect x="1" y="1" width="848" height="34" rx="4" fill="#161b22" />
  <rect x="1" y="27" width="848" height="8" fill="#161b22" />
  <text x="16" y="22" fill="#c9d1d9" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="13">bak-libra26@github:~$ git log --stat</text>
  <!-- Window controls ─ □ × -->
  <text x="782" y="22" fill="#484f58" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="14">─</text>
  <text x="806" y="22" fill="#484f58" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="14">□</text>
  <text x="828" y="22" fill="#484f58" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="14">×</text>
  <line x1="1" y1="35" x2="849" y2="35" stroke="#30363d" />

  <!-- Big number -->
  <g style="animation: fadeIn 0.4s 0.1s ease forwards; opacity: 0">
    <text x="38" y="88" fill="#7aa2f7" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="36" font-weight="bold">111</text>
    <text x="38" y="110" fill="#484f58" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13">contributions</text>
    <text x="38" y="130" fill="#484f58" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="12">2024 — present</text>
  </g>

  <!-- Separator -->
  <line x1="470" y1="48" x2="470" y2="180" stroke="#30363d" />

  <!-- Stats -->
  
    <g style="animation: fadeIn 0.4s 0.2s ease forwards; opacity: 0">
      <text x="500" y="72" fill="#484f58" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13">Repos</text>
      <text x="815" y="72" fill="#c9d1d9" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="14" text-anchor="end">13</text>
    </g>
    <g style="animation: fadeIn 0.4s 0.3s ease forwards; opacity: 0">
      <text x="500" y="102" fill="#484f58" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13">Stars</text>
      <text x="815" y="102" fill="#c9d1d9" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="14" text-anchor="end">4</text>
    </g>
    <g style="animation: fadeIn 0.4s 0.4s ease forwards; opacity: 0">
      <text x="500" y="132" fill="#484f58" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13">Streak</text>
      <text x="815" y="132" fill="#c9d1d9" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="14" text-anchor="end">2d</text>
    </g>
    <g style="animation: fadeIn 0.4s 0.5s ease forwards; opacity: 0">
      <text x="500" y="162" fill="#484f58" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13">Best</text>
      <text x="815" y="162" fill="#c9d1d9" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="14" text-anchor="end">2d</text>
    </g>
</svg>