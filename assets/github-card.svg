<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195" fill="none">
  <style>
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  </style>

  <!-- Card -->
  <rect x="0.5" y="0.5" width="494" height="194" rx="4.5" fill="#1a1b27" stroke="#292e42" />

  <!-- Title bar -->
  <rect x="1" y="1" width="493" height="34" rx="4" fill="#16161e" />
  <rect x="1" y="27" width="493" height="8" fill="#16161e" />
  <circle cx="20" cy="18" r="5.5" fill="#ff5f57" />
  <circle cx="38" cy="18" r="5.5" fill="#febc2e" />
  <circle cx="56" cy="18" r="5.5" fill="#28c840" />
  <text x="78" y="22" fill="#565f89" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="13">$ git log --stat</text>
  <line x1="1" y1="35" x2="494" y2="35" stroke="#292e42" />

  <!-- Big number -->
  <g style="animation: fadeIn 0.4s 0.1s ease forwards; opacity: 0">
    <text x="38" y="88" fill="#7aa2f7" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="36" font-weight="bold">87</text>
    <text x="38" y="110" fill="#565f89" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13">contributions</text>
    <text x="38" y="130" fill="#565f89" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="12">2024 — present</text>
  </g>

  <!-- Separator -->
  <line x1="248" y1="48" x2="248" y2="180" stroke="#292e42" />

  <!-- Stats -->
  
    <g style="animation: fadeIn 0.4s 0.2s ease forwards; opacity: 0">
      <text x="270" y="72" fill="#565f89" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13">Repos</text>
      <text x="462" y="72" fill="#c0caf5" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="14" text-anchor="end">13</text>
    </g>
    <g style="animation: fadeIn 0.4s 0.3s ease forwards; opacity: 0">
      <text x="270" y="102" fill="#565f89" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13">Stars</text>
      <text x="462" y="102" fill="#c0caf5" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="14" text-anchor="end">4</text>
    </g>
    <g style="animation: fadeIn 0.4s 0.4s ease forwards; opacity: 0">
      <text x="270" y="132" fill="#565f89" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13">Streak</text>
      <text x="462" y="132" fill="#c0caf5" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="14" text-anchor="end">2d</text>
    </g>
    <g style="animation: fadeIn 0.4s 0.5s ease forwards; opacity: 0">
      <text x="270" y="162" fill="#565f89" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13">Best</text>
      <text x="462" y="162" fill="#c0caf5" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="14" text-anchor="end">2d</text>
    </g>
</svg>